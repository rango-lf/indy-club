<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Team — Indy Club</title>
  <link rel="stylesheet" href="/components/style.css">
   <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <script src="/components/header.js"></script>
  <script src="/components/footer.js"></script>
</head>
<body>
<div class="window">
  <div id="site-header"></div>

    <div class="page active" id="page-team">
    <div class="page-inner" style="padding-bottom:0;">
      <div class="page-eyebrow">The Execs</div>
      <div class="page-title">Our Team</div>
      <div class="page-rule"></div>
      <p class="page-body">Meet the elected Indy Club Executives working hard to enhance your student experience!</p>
    </div>
    <div class="team-grid">
      <div class="team-card"><div class="avatar">P</div><h3>President</h3><p>Exec Team</p></div>
      <div class="team-card"><div class="avatar">VP</div><h3>VP Internal</h3><p>Exec Team</p></div>
      <div class="team-card"><div class="avatar">VP</div><h3>VP External</h3><p>Exec Team</p></div>
      <div class="team-card"><div class="avatar">T</div><h3>Treasurer</h3><p>Exec Team</p></div>
      <div class="team-card"><div class="avatar">E</div><h3>Events Director</h3><p>Exec Team</p></div>
      <div class="team-card"><div class="avatar">M</div><h3>Merch Director</h3><p>Exec Team</p></div>
    </div>
  </div>

  <div id="site-footer"></div>
</div>
<script src="/components/layout.js"></script>
</body>
</html>
